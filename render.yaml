services:
  - type: web
    name: studyo-ai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: AUTH_DEMO_EMAIL
        value: demo@studyoai.local
      - key: AUTH_DEMO_PASSWORD
        value: demo1234
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: OPENAI_PDF_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        sync: false
